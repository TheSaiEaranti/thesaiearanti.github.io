<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="portfolio-a.bundle.jsx"></script>

<script type="text/babel">
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "green",
  "displayFont": "serif"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useTweaks(TWEAKS_DEFAULTS);

  React.useEffect(() => {
    if (document.getElementById('pa-font-override')) return;
    const s = document.createElement('style');
    s.id = 'pa-font-override';
    s.textContent = `
      .pa-root[data-display-font="sans"] .pa-hero-title,
      .pa-root[data-display-font="sans"] .pa-sec-title,
      .pa-root[data-display-font="sans"] .pa-tl-head h3,
      .pa-root[data-display-font="sans"] .pa-project-name,
      .pa-root[data-display-font="sans"] .pa-skill-cat,
      .pa-root[data-display-font="sans"] .pa-link-val {
        font-family: 'Inter', sans-serif !important;
        font-weight: 600 !important; font-style: normal !important;
        letter-spacing: -0.025em !important;
      }
    `;
    document.head.appendChild(s);
  }, []);

  React.useEffect(() => {
    document.querySelectorAll('.pa-root').forEach((el) => {
      el.dataset.displayFont = tweaks.displayFont;
    });
  }, [tweaks.displayFont]);

  const palItems = [
    { id: 'about', label: 'Jump to: About', icon: '◉' },
    { id: 'experience', label: 'Jump to: Experience', icon: '◉' },
    { id: 'projects', label: 'Jump to: Projects', icon: '◉' },
    { id: 'skills', label: 'Jump to: Skills', icon: '◉' },
    { id: 'contact', label: 'Jump to: Contact', icon: '◉' },
    { id: 'email', label: 'Copy email address', icon: '✉', hint: 'saipreetam.earanti@utexas.edu' },
    { id: 'github', label: 'Open GitHub', icon: '↗', hint: 'TheSaiEaranti' },
    { id: 'linkedin', label: 'Open LinkedIn', icon: '↗', hint: 'sai-preetam-earanti-580717285' },
    { id: 'theme', label: 'Toggle: hacker mode', icon: '◐', hint: '↑↑↓↓←→←→BA' },
  ];
  const shell = useShell({});
  const [forceHacker, setForceHacker] = React.useState(false);

  const onPick = (it) => {
    if (it.id === 'email') navigator.clipboard?.writeText('saipreetam.earanti@utexas.edu');
    else if (it.id === 'github') window.open('https://github.com/TheSaiEaranti', '_blank');
    else if (it.id === 'linkedin') window.open('https://www.linkedin.com/in/sai-preetam-earanti-580717285/', '_blank');
    else if (it.id === 'theme') setForceHacker((h) => !h);
    else {
      document.getElementById(it.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  return (
    <>
      <PortfolioA accent={tweaks.accent} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent color">
          <TweakRadio
            value={tweaks.accent}
            onChange={(v) => setTweaks({ accent: v })}
            options={[
              { value: 'green', label: 'Terminal green' },
              { value: 'blue', label: 'Electric blue' },
              { value: 'orange', label: 'Burnt orange' },
              { value: 'magenta', label: 'Hot pink' },
              { value: 'amber', label: 'Amber' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Display font">
          <TweakRadio
            value={tweaks.displayFont}
            onChange={(v) => setTweaks({ displayFont: v })}
            options={[
              { value: 'serif', label: 'Instrument Serif (editorial)' },
              { value: 'sans', label: 'Inter (modernist)' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>

      <CommandPalette
        open={shell.paletteOpen}
        onClose={() => shell.setPaletteOpen(false)}
        items={palItems}
        onPick={onPick}
      />
      <HelpOverlay open={shell.helpOpen} onClose={() => shell.setHelpOpen(false)} />
      <ShellOverlay active={shell.hackerMode || forceHacker} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
